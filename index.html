<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primer Examen Parcial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /*estilo para el área del robot 3D */
        #canvas-container {
            width: 100%;
            height: 600px;
            background-color: #f8f9fa;
            border: 2px dashed #dee2e6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid py-4">
    <h2 class="text-center mb-4">Cinemática de Robot</h2>

    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Controles Articulares</h5>
                </div>
    <div class="card-body">
        <div class="mb-3">
        <label class="form-label fw-bold">Articulación q1 (Grados):</label>
            <div class="d-flex align-items-center gap-2">
        <input type="range" class="form-range w-75" id="q1_slider" min="-45" max="225" value="0">
        <input type="number" class="form-control w-25" id="q1_input" value="0">
            </div>
        <small class="text-muted">Rango: -45° a 225°</small>
        </div>

        <div class="mb-3">
        <label class="form-label fw-bold">Articulación q2 (Grados):</label>
        <div class="d-flex align-items-center gap-2">
            <input type="range" class="form-range w-75" id="q2_slider" min="0" max="125" value="0">
            <input type="number" class="form-control w-25" id="q2_input" value="0">
        </div>
        <small class="text-muted">Rango: 0° a 125°</small>
        </div>

        <div class="mb-3">
        <label class="form-label fw-bold">Extensión q3 (cm):</label>
        <div class="d-flex align-items-center gap-2">
            <input type="range" class="form-range w-75" id="q3_slider" min="0" max="30" value="20">
            <input type="number" class="form-control w-25" id="q3_input" value="20">
        </div>
        <small class="text-muted">Rango: 0 cm a 30 cm</small>
        </div>
    </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Posición Efector Final (Cartesiana)</h5>
                </div>
                <div class="card-body">
                    <p class="fs-5">X: <span id="posX" class="text-primary fw-bold">0.00</span> cm</p>
                    <p class="fs-5">Y: <span id="posY" class="text-primary fw-bold">0.00</span> cm</p>
                    <p class="fs-5">Z: <span id="posZ" class="text-primary fw-bold">0.00</span> cm</p>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title text-center">Espacio de Trabajo</h5>
                    <div id="canvas-container">
                        <p class="text-muted">Área de visualización 3D</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="funciones.js"></script>
</body>
</html>
